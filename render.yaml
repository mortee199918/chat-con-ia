services:
  - type: web
    name: chat-ia-backend
    env: python
    rootDir: BackEnd
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false

  - type: web
    name: chat-ia-frontend
    env: static
    rootDir: FrontEnd/chat-ia
    buildCommand: npm install && npm run build
    staticPublishPath: dist/chat-ia/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
